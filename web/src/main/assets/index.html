<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBridge - File Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .upload-zone {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2394a3b8' fill-opacity='0.1' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
        }
        .upload-zone.drag-over {
            background-color: rgba(14, 165, 233, 0.1);
            border-color: #0ea5e9;
            transform: scale(1.02);
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .progress-shimmer {
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255,255,255,0.3) 50%, 
                transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-enter {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">
    <!-- Pairing Screen -->
    <div id="pairing" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 md:p-12 max-w-md w-full text-center">
            <div class="mb-6">
                <span class="text-5xl">✈️</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-3">AirBridge</h1>
            <p class="text-gray-500 dark:text-gray-400 mb-8">Scan the QR code with your phone to connect</p>
            
            <div id="qrcode" class="inline-block p-4 bg-white rounded-xl shadow-inner mb-6"></div>
            
            <div class="flex items-center justify-center gap-3 text-gray-400 dark:text-gray-500">
                <div class="w-5 h-5 border-2 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
                <span class="text-sm">Waiting for phone to scan...</span>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden min-h-screen">
        <!-- Header -->
        <header class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="text-3xl">✈️</span>
                        <div>
                            <h1 class="text-xl font-bold text-gray-900 dark:text-white">AirBridge</h1>
                            <p id="connectionStatus" class="text-xs text-green-600 dark:text-green-400 flex items-center gap-1">
                                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                                Connected
                            </p>
                        </div>
                    </div>
                    <button id="themeToggle" class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700 transition-colors" title="Toggle dark mode">
                        <span id="themeIcon">🌙</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <!-- Upload Zone -->
            <div id="uploadZone" class="upload-zone border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-2xl p-8 md:p-12 text-center cursor-pointer transition-all duration-200 hover:border-brand-500 hover:shadow-lg mb-6">
                <div class="mb-4">
                    <span class="text-5xl">📤</span>
                </div>
                <h3 class="text-lg font-semibold text-gray-700 dark:text-gray-200 mb-2">Drop files here</h3>
                <p class="text-gray-500 dark:text-gray-400 text-sm mb-4">or click to browse</p>
                <button class="bg-brand-500 hover:bg-brand-600 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                    Select Files
                </button>
                <input type="file" id="fileInput" multiple class="hidden">
            </div>

            <!-- Upload Progress Section -->
            <div id="uploadSection" class="hidden mb-8">
                <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
                    <span>📊</span> Uploads
                </h2>
                <div id="uploadProgress" class="space-y-3"></div>
            </div>

            <!-- Files Section -->
            <div>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-gray-900 dark:text-white flex items-center gap-2">
                        <span>📁</span> Files
                    </h2>
                    <button onclick="loadFiles()" class="p-2 text-gray-500 hover:text-brand-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700 rounded-lg transition-colors" title="Refresh">
                        <span class="text-xl">🔄</span>
                    </button>
                </div>
                <div id="filesList" class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 divide-y divide-gray-100 dark:divide-gray-700">
                    <div class="p-8 text-center text-gray-400 dark:text-gray-500">
                        <span class="text-4xl mb-2 block">📂</span>
                        <p>No files yet</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Toast Container -->
        <div id="toastContainer" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
    </div>

    <!-- Push Notification -->
    <div id="pushNotification" class="fixed bottom-4 left-4 z-50 bg-brand-500 text-white px-4 py-3 rounded-lg shadow-lg hidden">
        <div class="flex items-center gap-3">
            <span class="animate-bounce">📥</span>
            <span>Receiving file...</span>
        </div>
    </div>

    <script>
        // ==========================================
        // Debug Mode - Set window.DEBUG_UPLOAD = true in console
        // ==========================================
        const DEBUG_UPLOAD = window.DEBUG_UPLOAD || false;
        function debugLog(area, message, data) {
            if (!DEBUG_UPLOAD) return;
            console.log(`[${area}] ${message}`, data || '');
        }

        // ==========================================
        // Theme Management
        // ==========================================
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;

        const savedTheme = localStorage.getItem('airbridge-theme') || 'light';
        html.classList.toggle('dark', savedTheme === 'dark');
        updateThemeIcon(savedTheme === 'dark');

        themeToggle.addEventListener('click', () => {
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('airbridge-theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        });

        function updateThemeIcon(isDark) {
            themeIcon.textContent = isDark ? '☀️' : '🌙';
        }

        // ==========================================
        // App State
        // ==========================================
        const serverUrl = window.location.origin;
        let token = new URLSearchParams(window.location.search).get('token');
        let pairingId = null;
        let sseConnection = null;

        // ==========================================
        // Initialization
        // ==========================================
        if (token && token !== 'null') { 
            showApp(); 
        } else { 
            startPairing(); 
        }

        // ==========================================
        // Pairing Flow
        // ==========================================
        async function startPairing() {
            debugLog('PAIRING', 'Requesting pairing session...');
            try {
                const response = await fetch(`${serverUrl}/api/pair/request`, { method: 'POST' });
                const data = await response.json();
                pairingId = data.pairingId;
                debugLog('PAIRING', `Got pairingId: ${pairingId}`);
                const pairingUrl = `airbridge://pair?id=${pairingId}&server=${encodeURIComponent(serverUrl)}`;
                new QRCode(document.getElementById('qrcode'), { 
                    text: pairingUrl, 
                    width: 200, 
                    height: 200, 
                    colorDark: '#0f172a', 
                    colorLight: '#ffffff', 
                    correctLevel: QRCode.CorrectLevel.H 
                });
                checkPairingStatus();
            } catch (error) { 
                debugLog('PAIRING', 'Failed:', error);
                showToast('Connection failed. Please refresh.', 'error');
            }
        }

        async function checkPairingStatus() {
            try {
                const response = await fetch(`${serverUrl}/api/pair/status?id=${pairingId}`);
                const data = await response.json();
                if (data.approved && data.token) {
                    token = data.token;
                    window.history.replaceState({}, '', `${serverUrl}/?token=${token}`);
                    showApp();
                } else { 
                    setTimeout(checkPairingStatus, 2000); 
                }
            } catch (error) { 
                setTimeout(checkPairingStatus, 2000); 
            }
        }

        function showApp() {
            document.getElementById('pairing').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            loadFiles();
            startPushPolling();
            startServerSse();
            showToast('Connected to AirBridge!', 'success');
        }

        // ==========================================
        // DETERMINISTIC UPLOAD QUEUE MANAGER v2.1
        // ==========================================
        class UploadQueueManager {
            constructor(maxParallel = 3) {
                this.maxParallel = maxParallel;
                this.active = 0;
                this.queue = [];
                this.items = new Map();
                this.globalPaused = false;
                this.processing = false;  // Reentrancy guard
            }

            add(file, priority = 0) {
                const item = new UploadItem(file, priority);
                this.items.set(item.id, item);
                this.queue.push(item);
                startUploadStatusSync(item.id); // Fallback when SSE misses state updates
                debugLog('QUEUE', `Added ${item.id} (${file.name}), queue length: ${this.queue.length}`);
                this.process();
                return item;
            }

            process() {
                if (this.processing) return;  // Atomic guard - only one scheduler runs
                if (this.globalPaused) {
                    debugLog('QUEUE', 'Global pause active, not processing');
                    return;
                }

                this.processing = true;
                try {
                    while (this.active < this.maxParallel && this.queue.length > 0) {
                        const next = this.dequeue();
                        if (next) {
                            this.start(next);
                        }
                    }
                } finally {
                    this.processing = false;
                }
                
                this.updateUI();
            }

            dequeue() {
                // Sort by priority (higher = first)
                this.queue.sort((a, b) => b.priority - a.priority);
                const item = this.queue.shift();
                debugLog('QUEUE', `Dequeued ${item?.id}, remaining: ${this.queue.length}`);
                return item;
            }

            start(item) {
                this.active++;  // Increment BEFORE starting (prevents race)
                item.state = 'uploading';
                item.isPaused = false;
                debugLog('QUEUE', `Starting ${item.id}, active: ${this.active}/${this.maxParallel}`);
                
                performUpload(item).finally(() => {
                    this.active--;
                    debugLog('QUEUE', `Completed ${item.id}, active: ${this.active}`);
                    this.process();
                });
            }

            pause(id) {
                const item = this.items.get(id);
                if (!item) return;
                
                debugLog('QUEUE', `Pausing ${id}`);
                item.state = 'paused';
                item.isPaused = true;
                
                // Abort XHR immediately
                if (item.xhr) {
                    item.xhr.abort();
                    item.xhr = null;
                }
                
                // Remove from queue if still queued
                const queueIndex = this.queue.findIndex(i => i.id === id);
                if (queueIndex >= 0) {
                    this.queue.splice(queueIndex, 1);
                }
                
                this.updateUI();
            }

            resume(id) {
                const item = this.items.get(id);
                if (!item) return false;

                // Guard against stale or duplicate resume attempts
                if (item.state === 'completed' || item.state === 'cancelled') return false;
                if (item.state === 'uploading' && item.xhr) return false;

                debugLog('QUEUE', `Resuming ${id} from state: ${item.state}`);
                item.state = 'queued';
                item.isPaused = false;

                // Don't add to queue if already queued
                if (!this.queue.find(i => i.id === id)) {
                    this.queue.push(item);
                }
                this.process();
                return true;
            }

            pauseAll() {
                debugLog('QUEUE', 'Pausing all uploads');
                this.globalPaused = true;
                
                // Pause all uploading items
                this.items.forEach(item => {
                    if (item.state === 'uploading' || item.state === 'queued') {
                        this.pause(item.id);
                    }
                });
                
                this.updateUI();
            }

            resumeAll() {
                debugLog('QUEUE', 'Resuming all uploads');
                this.globalPaused = false;
                
                this.items.forEach(item => {
                    if (item.state === 'paused' || item.state === 'pausing') {
                        this.resume(item.id);
                    }
                });
                
                this.process();
            }

            cancel(id) {
                const item = this.items.get(id);
                if (!item) return;
                
                debugLog('QUEUE', `Cancelling ${id}`);
                item.state = 'cancelled';
                item.isPaused = true;

                if (item.xhr) {
                    item.xhr.abort();
                    item.xhr = null;
                }
                
                // Remove from queue if present
                const queueIndex = this.queue.findIndex(i => i.id === id);
                if (queueIndex >= 0) {
                    this.queue.splice(queueIndex, 1);
                }
                
                this.items.delete(id);
                stopUploadStatusSync(id);
                this.updateUI();
            }

            updateUI() {
                const uploads = Array.from(this.items.values());
                const state = {
                    isPaused: this.globalPaused,
                    active: uploads.filter(u => u.state === 'uploading').length,
                    queued: this.queue.length,
                    paused: uploads.filter(u => u.state === 'paused' || u.state === 'pausing').length
                };
                renderUploads(uploads, state);
            }

            getStats() {
                return {
                    active: this.active,
                    queued: this.queue.length,
                    total: this.items.size
                };
            }
        }

        class UploadItem {
            constructor(file, priority = 0) {
                this.id = Date.now() + '_' + Math.random().toString(36).slice(2, 9);
                this.file = file;
                this.name = file.name;
                this.fileSize = file.size;
                this.priority = priority;
                this.offset = 0;
                this.serverOffset = 0;  // Server-confirmed bytes (source of truth)
                this.state = 'queued';
                this.isPaused = false;
                this.xhr = null;
                this.progress = 0;
                this.speed = 0;
                this.lastProgressTime = 0;
                this.lastProgressBytes = 0;
            }

            updateProgress(bytesReceived) {
                this.serverOffset = bytesReceived;  // Server is source of truth
                this.offset = Math.max(this.offset, bytesReceived);  // Never go backward
                this.progress = this.fileSize > 0 ? (bytesReceived / this.fileSize) * 100 : 0;
                
                // Calculate speed
                const now = Date.now();
                if (this.lastProgressTime > 0) {
                    const dt = (now - this.lastProgressTime) / 1000;
                    const db = bytesReceived - this.lastProgressBytes;
                    if (dt > 0) {
                        this.speed = db / dt;
                    }
                }
                this.lastProgressTime = now;
                this.lastProgressBytes = bytesReceived;
            }
        }

        const uploadQueue = new UploadQueueManager(3);

        // ==========================================
        // Upload status sync fallback (for missed SSE / background tab delays)
        // ==========================================
        const uploadStatusSyncTimers = new Map();

        function startUploadStatusSync(uploadId) {
            if (uploadStatusSyncTimers.has(uploadId)) return;

            debugLog('SYNC', `Starting status sync for ${uploadId}`);
            const timer = setInterval(async () => {
                const item = uploadQueue.items.get(uploadId);
                if (!item) {
                    stopUploadStatusSync(uploadId);
                    return;
                }

                if (item.state === 'completed' || item.state === 'cancelled' || item.state === 'error') {
                    stopUploadStatusSync(uploadId);
                    return;
                }

                try {
                    const statusRes = await fetch(
                        `${serverUrl}/api/upload/status?id=${uploadId}&filename=${encodeURIComponent(item.name)}&token=${token}`,
                        { signal: AbortSignal.timeout(5000) }
                    );
                    if (!statusRes.ok) return;

                    const status = await statusRes.json();
                    const serverState = status.state || status.status;

                    if (serverState === 'paused' || serverState === 'pausing') {
                        if (item.state === 'uploading' && item.xhr) {
                            debugLog('SYNC', `${uploadId} - Server paused, aborting`);
                            item.xhr.abort();
                        }
                        item.isPaused = true;
                        item.state = 'paused';
                        if (status.bytesReceived !== undefined) {
                            item.updateProgress(status.bytesReceived);
                        }
                        uploadQueue.updateUI();
                        return;
                    }

                    if (serverState === 'resuming') {
                        if (item.state === 'paused' || item.state === 'pausing') {
                            debugLog('SYNC', `${uploadId} - Server resuming, triggering local resume`);
                            const resumed = uploadQueue.resume(uploadId);
                            if (resumed && item.state !== 'uploading') {
                                item.state = 'resuming';
                            }
                            uploadQueue.updateUI();
                        }
                    }
                } catch (_) {
                    // Ignore sync errors; SSE or next tick will recover
                }
            }, 1500);

            uploadStatusSyncTimers.set(uploadId, timer);
        }

        function stopUploadStatusSync(uploadId) {
            const timer = uploadStatusSyncTimers.get(uploadId);
            if (!timer) return;
            clearInterval(timer);
            uploadStatusSyncTimers.delete(uploadId);
            debugLog('SYNC', `Stopped status sync for ${uploadId}`);
        }

        // ==========================================
        // DETERMINISTIC performUpload()
        // Never waits for server. POSTs immediately. Retries on busy.
        // ==========================================
        async function performUpload(item) {
            let backoff = 200;
            let attempts = 0;
            const maxAttempts = 20;

            while (attempts < maxAttempts) {
                attempts++;
                
                // Strict check for stopped states
                if (item.state === 'paused' || item.state === 'pausing' || item.state === 'cancelled') {
                    debugLog('UPLOAD', `${item.id} - Stopped (state: ${item.state})`);
                    return;
                }

                try {
                    // 1️⃣ Fetch authoritative offset from server
                    debugLog('UPLOAD', `${item.id} - Fetching status (attempt ${attempts})`);
                    const statusRes = await fetch(
                        `${serverUrl}/api/upload/status?id=${item.id}&filename=${encodeURIComponent(item.name)}&token=${token}`,
                        { signal: AbortSignal.timeout(10000) }
                    );
                    
                    if (!statusRes.ok) {
                        throw new Error(`HTTP ${statusRes.status}`);
                    }
                    
                    const status = await statusRes.json();
                    debugLog('UPLOAD', `${item.id} - Server status:`, status);

                    const serverState = status.state || status.status;

                    // Sync local state with server - pause from phone handling
                    if (serverState && serverState !== item.state) {
                        debugLog('UPLOAD', `${item.id} - Syncing state from server: ${serverState}`);
                        
                        // RESUMING from server - we should POST immediately to start uploading
                        if (serverState === 'resuming') {
                            debugLog('UPLOAD', `${item.id} - Server is resuming, proceeding to POST immediately`);
                            if (item.state !== 'uploading') {
                                item.state = 'resuming';
                            }
                            item.isPaused = false;
                            // Continue to POST below - don't return
                        }
                        // PAUSED or INTERRUPTED from phone - abort XHR immediately, freeze progress
                        else if (serverState === 'paused' || serverState === 'pausing' || serverState === 'interrupted') {
                        // CRITICAL: Abort XHR immediately to stop progress
                        if (item.xhr) {
                            item.xhr.abort();
                            item.xhr = null;
                        }
                        item.isPaused = true;
                        item.state = 'paused';
                        
                        // Freeze progress at server-reported offset
                        const serverPercent = (status.bytesReceived / item.fileSize) * 100;
                        item.progress = Math.min(serverPercent, 99.9);
                        item.serverOffset = status.bytesReceived || 0;
                        item.offset = status.bytesReceived || 0;
                        
                        uploadQueue.updateUI();
                        return; // Stop upload loop
                    }
                        
                        if (serverState === 'completed') {
                            item.state = 'completed';
                            item.updateProgress(item.fileSize);
                            uploadQueue.updateUI();
                            return;
                        }
                    }

                    // Re-check local state after async call
                    if (item.state === 'paused' || item.state === 'pausing' || item.state === 'cancelled') return;

                    // Server says busy - wait and retry
                    if (status.status === 'busy' || status.isBusy) {
                        debugLog('UPLOAD', `${item.id} - Server busy, backing off ${backoff}ms`);
                        await sleep(backoff);
                        backoff = Math.min(backoff * 2, 3000);
                        continue;
                    }

                    // Handle offset mismatch - server tells us correct offset
                    let serverOffset = status.bytesReceived || 0;
                    item.updateProgress(serverOffset);
                    uploadQueue.updateUI();

                    // 2️⃣ Send chunk from offset (IMMEDIATE POST)
                    const chunk = item.file.slice(serverOffset);
                    const result = await sendChunk(item, serverOffset, chunk);

                    if (result.success) {
                        item.state = 'completed';
                        item.updateProgress(item.fileSize);
                        uploadQueue.updateUI();
                        showToast(`${item.name} uploaded successfully`, 'success');
                        stopUploadStatusSync(item.id);
                        loadFiles();
                        return;
                    }

                    if (result.busy) {
                        debugLog('UPLOAD', `${item.id} - Got 409 busy, retrying in ${backoff}ms`);
                        await sleep(backoff);
                        backoff = Math.min(backoff * 2, 3000);
                        continue;
                    }

                    if (result.paused || result.aborted) {
                        // If state was changed during XHR, stop the loop
                        if (item.state === 'pausing' || item.state === 'paused' || item.isPaused) {
                            debugLog('UPLOAD', `${item.id} - Stopped after XHR abort`);
                            return;
                        }
                        // Otherwise, something went wrong, retry
                        continue;
                    }

                    if (result.offsetMismatch) {
                        debugLog('UPLOAD', `${item.id} - Offset mismatch detected, refreshing offset`);
                        continue; // Loop back to fetch fresh status
                    }

                    // Network or other error
                    throw new Error(result.error || 'Upload failed');

                } catch (err) {
                    debugLog('UPLOAD', `${item.id} - Error: ${err.message}`);
                    
                    if (item.state === 'paused' || item.state === 'pausing' || item.state === 'cancelled' || item.isPaused) {
                        return;
                    }
                    
                    // Exponential backoff on network errors
                    await sleep(backoff);
                    backoff = Math.min(backoff * 2, 3000);
                }
            }

            // Max attempts reached
            debugLog('UPLOAD', `${item.id} - Max attempts reached, failing`);
            item.state = 'error';
            stopUploadStatusSync(item.id);
            uploadQueue.updateUI();
        }

        async function sendChunk(item, offset, chunk) {
            return new Promise((resolve) => {
                const xhr = new XMLHttpRequest();
                item.xhr = xhr;

                xhr.open('POST', `${serverUrl}/api/upload?token=${token}&filename=${encodeURIComponent(item.name)}&id=${item.id}`);

                // Always set Content-Range — not just when offset > 0
                xhr.setRequestHeader(
                    'Content-Range',
                    `bytes ${offset}-${item.fileSize - 1}/${item.fileSize}`
                );

                const percentBase = (offset / item.fileSize) * 100;

                xhr.upload.onprogress = (e) => {
                    // STOP Progress UI instantly if paused or XHR nullified
                    if (item.isPaused || !item.xhr) return;

                    if (e.lengthComputable) {
                        const chunkProgress = e.loaded / e.total;
                        const totalProgress = percentBase + (chunkProgress * (100 - percentBase));
                        
                        // CAP progress by server-reported offset + small margin
                        // Prevents TCP buffer drift - browser may have sent bytes server hasn't written yet
                        const serverPercent = (item.serverOffset / item.fileSize) * 100;
                        const cappedProgress = Math.min(totalProgress, serverPercent + 2);
                        
                        item.progress = Math.min(cappedProgress, 99.9);
                        const optimisticOffset = Math.min(offset + e.loaded, item.fileSize);
                        item.offset = Math.max(item.offset, item.serverOffset, optimisticOffset);  // Monotonic local+server progress
                        uploadQueue.updateUI();
                    }
                };

                xhr.onload = () => {
                    item.xhr = null;
                    
                    if (xhr.status === 200) {
                        try {
                            const resp = JSON.parse(xhr.responseText);
                            if (resp.success || resp.state === 'completed') {
                                resolve({ success: true });
                            } else if (resp.state === 'paused' || resp.state === 'pausing') {
                                resolve({ paused: true, bytesReceived: resp.bytesReceived });
                            } else if (resp.state === 'cancelled') {
                                resolve({ cancelled: true });
                            } else {
                                resolve({ error: resp.error || 'Unknown error' });
                            }
                        } catch (e) {
                            resolve({ success: true }); // Assume success if parse fails but 200
                        }
                    } else if (xhr.status === 409) {
                        // Server busy or offset mismatch
                        try {
                            const resp = JSON.parse(xhr.responseText);
                            if (resp.status === 'offset_mismatch' || resp.error?.includes('offset')) {
                                resolve({ offsetMismatch: true, diskSize: resp.diskSize });
                            } else {
                                resolve({ busy: true, retryAfterMs: resp.retryAfterMs });
                            }
                        } catch (e) {
                            resolve({ busy: true });
                        }
                    } else if (xhr.status === 410) {
                        // Could be cancelled or file deleted externally
                        try {
                            const resp = JSON.parse(xhr.responseText);
                            if (resp.error === 'file_deleted') {
                                debugLog('UPLOAD', `${item.id} - File deleted externally, restarting from 0`);
                                item.offset = 0;
                                item.updateProgress(0);
                                resolve({ offsetMismatch: true, diskSize: 0 });
                                return;
                            }
                        } catch (e) {}
                        resolve({ cancelled: true });
                    } else {
                        resolve({ error: `HTTP ${xhr.status}` });
                    }
                };

                xhr.onerror = () => {
                    item.xhr = null;
                    resolve({ error: 'Network error' });
                };

                xhr.onabort = () => {
                    item.xhr = null;
                    resolve({ aborted: true });
                };

                xhr.send(chunk);
            });
        }

        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        // ==========================================
        // SSE (Server-Sent Events) - Optimization only
        // Never gating for resume. Browser POSTs immediately.
        // ==========================================
        function startServerSse() {
            if (sseConnection) sseConnection.close();

            const sseUrl = `${serverUrl}/api/upload/events?token=${token}`;
            sseConnection = new EventSource(sseUrl);

            sseConnection.onopen = () => debugLog('SSE', 'Connected');

            sseConnection.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    debugLog('SSE', 'Received:', data);

                    if (data.type === 'queue') {
                        // Update global pause state
                        if (data.isPaused && !uploadQueue.globalPaused) {
                            uploadQueue.pauseAll();
                        } else if (!data.isPaused && uploadQueue.globalPaused) {
                            uploadQueue.resumeAll();
                        }
                        return;
                    }

                    if (data.type === 'upload' && data.uploadId) {
                        const item = uploadQueue.items.get(data.uploadId);
                        if (!item) return;

                        // Handle server-side state changes
                        if (data.state === 'cancelled') {
                            item.state = 'cancelled';
                            item.isPaused = true;
                            if (item.xhr) item.xhr.abort();
                            uploadQueue.items.delete(data.uploadId);
                            stopUploadStatusSync(data.uploadId);
                            uploadQueue.updateUI();
                        } else if (data.state === 'pausing' || data.state === 'paused') {
                            // Server is pausing/paused - snap UI and abort
                            debugLog('SSE', `${data.uploadId} - Server signaled ${data.state}, stopping local stream`);
                            item.state = data.state;
                            item.isPaused = true;
                            if (item.xhr) item.xhr.abort();

                            // Explicitly sync bytes
                            if (data.bytesReceived !== undefined) {
                                item.updateProgress(data.bytesReceived);
                            }
                            uploadQueue.updateUI();
                        } else if (data.state === 'resuming') {
                            // Server is ready for resume - browser should POST
                            debugLog('SSE', `${data.uploadId} - Server resuming, triggering resume`);

                            // BUG FIX order: Call resume() first, then update item state
                            const resumed = uploadQueue.resume(data.uploadId);
                            if (resumed) {
                                if (item.state !== 'uploading') {
                                    item.state = 'resuming';
                                }
                                uploadQueue.updateUI();
                            }
                        } else if (data.state === 'completed') {
                            item.state = 'completed';
                            item.serverOffset = item.fileSize;
                            item.offset = item.fileSize;
                            item.progress = 100;
                            if (item.xhr) item.xhr.abort();
                            uploadQueue.updateUI();
                            stopUploadStatusSync(data.uploadId);
                            showToast(`${item.name} uploaded successfully`, 'success');
                            loadFiles();
                        } else if (data.state === 'uploading') {
                            // Only update progress if we are actually uploading
                            if (!item.isPaused && item.state === 'uploading' && data.bytesReceived > item.serverOffset) {
                                item.serverOffset = data.bytesReceived;
                                // Only update visible progress if server has moved forward
                                if (data.bytesReceived > item.offset) {
                                    item.updateProgress(data.bytesReceived);
                                }
                                uploadQueue.updateUI();
                            }
                        }
                    }
                } catch (e) {
                    debugLog('SSE', 'Parse error:', e);
                }
            };

            sseConnection.onerror = () => {
                debugLog('SSE', 'Error, reconnecting in 3s...');
                setTimeout(startServerSse, 3000);
            };
        }

        // ==========================================
        // File Management
        // ==========================================
        async function loadFiles() {
            try {
                const response = await fetch(`${serverUrl}/api/files?token=${token}`);
                const files = await response.json();
                const container = document.getElementById('filesList');

                if (files.length === 0) {
                    container.innerHTML = `
                        <div class="p-8 text-center text-gray-400 dark:text-gray-500">
                            <span class="text-4xl mb-2 block">📂</span>
                            <p>No files yet</p>
                        </div>`;
                    return;
                }

                container.innerHTML = files.map(file => `
                    <div class="flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                        <div class="flex items-center gap-3 min-w-0">
                            <span class="text-2xl">📄</span>
                            <span class="font-medium text-gray-900 dark:text-white truncate">${escapeHtml(file.name)}</span>
                        </div>
                        <a href="${serverUrl}/api/download/${file.id}?token=${token}" 
                           download 
                           class="flex items-center gap-2 px-4 py-2 bg-brand-500 hover:bg-brand-600 text-white rounded-lg transition-colors text-sm font-medium">
                            <span>⬇️</span>
                            <span>Download</span>
                        </a>
                    </div>
                `).join('');
            } catch (error) {
                showToast('Failed to load files', 'error');
            }
        }

        async function startPushPolling() {
            setInterval(async () => {
                try {
                    const response = await fetch(`${serverUrl}/api/push/status?token=${token}`);
                    const data = await response.json();
                    if (data.pending && data.file) {
                        showPushNotification();
                        const link = document.createElement('a');
                        link.href = `${serverUrl}/api/push/next?token=${token}`;
                        link.download = data.file.fileName;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        loadFiles();
                    }
                } catch (e) {}
            }, 3000);
        }

        // ==========================================
        // Upload UI Handling
        // ==========================================
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');

        uploadZone.onclick = () => fileInput.click();

        uploadZone.ondragover = (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        };

        uploadZone.ondragleave = () => {
            uploadZone.classList.remove('drag-over');
        };

        uploadZone.ondrop = (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        };

        fileInput.onchange = (e) => handleFiles(e.target.files);

        function handleFiles(files) {
            const uploadSection = document.getElementById('uploadSection');
            uploadSection.classList.remove('hidden');

            Array.from(files).forEach(file => {
                uploadQueue.add(file, 0);
            });
        }

        async function pauseUpload(id) {
            debugLog('UI', `Pause requested for ${id}`);
            await fetch(`${serverUrl}/api/upload/pause?token=${token}&id=${id}`, { method: 'POST' });
            uploadQueue.pause(id);
        }

        async function resumeUpload(id) {
            debugLog('UI', `Resume requested for ${id}`);
            try {
                const response = await fetch(`${serverUrl}/api/upload/resume?token=${token}&id=${id}`, { method: 'POST' });
                const data = await response.json().catch(() => ({}));

                if (response.ok && data.success) {
                    // Optimistically show resuming, scheduler still starts via queue resume.
                    // BUG FIX order: Call resume() first, then update state
                    const resumed = uploadQueue.resume(id);
                    if (resumed) {
                        const item = uploadQueue.items.get(id);
                        if (item) {
                            if (item.state !== 'uploading') {
                                item.state = 'resuming';
                            }
                            uploadQueue.updateUI();
                        }
                    }
                    return;
                }

                showToast(data.message || 'Unable to resume from current state', 'error');
            } catch (e) {
                showToast('Resume request failed', 'error');
            }
        }

        async function cancelUpload(id) {
            debugLog('UI', `Cancel requested for ${id}`);
            await fetch(`${serverUrl}/api/upload/cancel?token=${token}&id=${id}`, { method: 'POST' });
            uploadQueue.cancel(id);
        }

        async function pauseAll() {
            debugLog('UI', 'Pause all requested');
            await fetch(`${serverUrl}/api/upload/pauseAll?token=${token}`, { method: 'POST' });
            uploadQueue.pauseAll();
        }

        async function resumeAll() {
            debugLog('UI', 'Resume all requested');
            await fetch(`${serverUrl}/api/upload/resumeAll?token=${token}`, { method: 'POST' });
            uploadQueue.resumeAll();
        }

        function renderUploads(uploads, queueState) {
            const container = document.getElementById('uploadProgress');
            if (!container) return;

            let headerHtml = '';
            if (uploads.length > 0) {
                headerHtml = `
                    <div class="flex items-center justify-between mb-3 text-sm text-gray-600 dark:text-gray-400">
                        <span>${queueState.active} active • ${queueState.queued} queued • ${queueState.paused} paused</span>
                        ${queueState.isPaused ?
                            '<button onclick="resumeAll()" class="text-brand-500 hover:text-brand-600 font-medium">Resume All</button>' :
                            '<button onclick="pauseAll()" class="text-brand-500 hover:text-brand-600 font-medium">Pause All</button>'}
                    </div>
                `;
            }

            const itemsHtml = uploads.map(u => renderUploadItem(u)).join('');
            container.innerHTML = headerHtml + itemsHtml;
        }

        function renderUploadItem(upload) {
            const percent = Math.round(upload.progress);
            let statusText = '';
            let actionButtons = '';

            switch (upload.state) {
                case 'none':
                case 'queued':
                    statusText = 'Queued';
                    actionButtons = `<button onclick="cancelUpload('${upload.id}')" class="text-red-500 hover:text-red-600 text-sm">Cancel</button>`;
                    break;
                case 'resuming':
                    statusText = 'Resuming...';
                    actionButtons = `<button onclick="pauseUpload('${upload.id}')" class="text-yellow-500 hover:text-yellow-600 text-sm mr-2">Pause</button>
                        <button onclick="cancelUpload('${upload.id}')" class="text-red-500 hover:text-red-600 text-sm">Cancel</button>`;
                    break;
                case 'uploading':
                    // Only show speed if we have actual data flowing
                    const speedText = upload.speed > 0 ? formatSpeed(upload.speed) : 'connecting...';
                    statusText = `Uploading ${speedText}`;
                    actionButtons = `
                        <button onclick="pauseUpload('${upload.id}')" class="text-yellow-500 hover:text-yellow-600 text-sm mr-2">Pause</button>
                        <button onclick="cancelUpload('${upload.id}')" class="text-red-500 hover:text-red-600 text-sm">Cancel</button>
                    `;
                    break;
                case 'pausing':
                    statusText = 'Pausing...';
                    actionButtons = `<button onclick="cancelUpload('${upload.id}')" class="text-red-500 hover:text-red-600 text-sm">Cancel</button>`;
                    break;
                case 'paused':
                    statusText = 'Paused';
                    actionButtons = `
                        <button onclick="resumeUpload('${upload.id}')" class="text-green-500 hover:text-green-600 text-sm mr-2">Resume</button>
                        <button onclick="cancelUpload('${upload.id}')" class="text-red-500 hover:text-red-600 text-sm">Cancel</button>
                    `;
                    break;
                case 'completed':
                    statusText = 'Completed';
                    actionButtons = '';
                    break;
                case 'cancelled':
                    statusText = 'Cancelled';
                    actionButtons = '';
                    break;
                case 'error':
                    statusText = 'Error';
                    actionButtons = `
                        <button onclick="resumeUpload('${upload.id}')" class="text-brand-500 hover:text-brand-600 text-sm mr-2">Retry</button>
                        <button onclick="cancelUpload('${upload.id}')" class="text-red-500 hover:text-red-600 text-sm">Cancel</button>
                    `;
                    break;
                default:
                    statusText = upload.state;
            }

            return `
                <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700 mb-3">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-3 min-w-0">
                            <span class="text-xl">📄</span>
                            <span class="font-medium text-gray-900 dark:text-white truncate">${escapeHtml(upload.name)}</span>
                            <span class="text-xs text-gray-500">${formatBytes(upload.fileSize)}</span>
                        </div>
                        <div class="flex items-center gap-2 text-sm">
                            <span class="text-gray-600 dark:text-gray-300">${percent}%</span>
                            ${actionButtons}
                        </div>
                    </div>
                    <div class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r from-brand-500 to-brand-600 rounded-full transition-all duration-300" style="width: ${percent}%"></div>
                    </div>
                    <div class="flex justify-between mt-1 text-xs text-gray-500 dark:text-gray-400">
                        <span>${statusText}</span>
                        <span>${formatBytes(Math.max(upload.serverOffset || 0, upload.state === 'completed' ? upload.fileSize : 0))} / ${formatBytes(upload.fileSize)}</span>
                    </div>
                </div>
            `;
        }

        function formatSpeed(bps) {
            if (bps >= 1000000) return (bps / 1000000).toFixed(1) + ' MB/s';
            if (bps >= 1000) return (bps / 1000).toFixed(1) + ' KB/s';
            return bps.toFixed(0) + ' B/s';
        }

        function formatBytes(bytes) {
            if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
            if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
            if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return bytes + ' B';
        }

        // ==========================================
        // Utilities
        // ==========================================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                info: 'bg-brand-500'
            };
            
            const icons = {
                success: '✓',
                error: '✕',
                info: 'ℹ'
            };
            
            toast.className = `${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 toast-enter`;
            toast.innerHTML = `<span>${icons[type]}</span><span>${escapeHtml(message)}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function showPushNotification() {
            const notif = document.getElementById('pushNotification');
            notif.classList.remove('hidden');
            setTimeout(() => notif.classList.add('hidden'), 3000);
        }

        // Expose for debugging
        window.DEBUG_UPLOAD = false;
        window.uploadQueue = uploadQueue;
        window.debugLog = debugLog;
    </script>
</body>
</html>
