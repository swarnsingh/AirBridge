<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBridge - File Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Drag and drop zone animations */
        .upload-zone {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2394a3b8' fill-opacity='0.1' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
        }
        .upload-zone.drag-over {
            background-color: rgba(14, 165, 233, 0.1);
            border-color: #0ea5e9;
            transform: scale(1.02);
        }

        /* Progress bar animation */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .progress-shimmer {
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255,255,255,0.3) 50%, 
                transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        /* Toast notification */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-enter {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">
    <!-- Pairing Screen -->
    <div id="pairing" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 md:p-12 max-w-md w-full text-center">
            <div class="mb-6">
                <span class="text-5xl">✈️</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-3">AirBridge</h1>
            <p class="text-gray-500 dark:text-gray-400 mb-8">Scan the QR code with your phone to connect</p>
            
            <div id="qrcode" class="inline-block p-4 bg-white rounded-xl shadow-inner mb-6"></div>
            
            <div class="flex items-center justify-center gap-3 text-gray-400 dark:text-gray-500">
                <div class="w-5 h-5 border-2 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
                <span class="text-sm">Waiting for phone to scan...</span>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden min-h-screen">
        <!-- Header -->
        <header class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="text-3xl">✈️</span>
                        <div>
                            <h1 class="text-xl font-bold text-gray-900 dark:text-white">AirBridge</h1>
                            <p id="connectionStatus" class="text-xs text-green-600 dark:text-green-400 flex items-center gap-1">
                                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                                Connected
                            </p>
                        </div>
                    </div>
                    <button id="themeToggle" class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700 transition-colors" title="Toggle dark mode">
                        <span id="themeIcon">🌙</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <!-- Upload Zone -->
            <div id="uploadZone" class="upload-zone border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-2xl p-8 md:p-12 text-center cursor-pointer transition-all duration-200 hover:border-brand-500 hover:shadow-lg mb-6">
                <div class="mb-4">
                    <span class="text-5xl">📤</span>
                </div>
                <h3 class="text-lg font-semibold text-gray-700 dark:text-gray-200 mb-2">Drop files here</h3>
                <p class="text-gray-500 dark:text-gray-400 text-sm mb-4">or click to browse</p>
                <button class="bg-brand-500 hover:bg-brand-600 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                    Select Files
                </button>
                <input type="file" id="fileInput" multiple class="hidden">
            </div>

            <!-- Upload Progress Section -->
            <div id="uploadSection" class="hidden mb-8">
                <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
                    <span>📊</span> Uploads
                </h2>
                <div id="uploadProgress" class="space-y-3"></div>
            </div>

            <!-- Files Section -->
            <div>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-gray-900 dark:text-white flex items-center gap-2">
                        <span>📁</span> Files
                    </h2>
                    <button onclick="loadFiles()" class="p-2 text-gray-500 hover:text-brand-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700 rounded-lg transition-colors" title="Refresh">
                        <span class="text-xl">🔄</span>
                    </button>
                </div>
                <div id="filesList" class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 divide-y divide-gray-100 dark:divide-gray-700">
                    <div class="p-8 text-center text-gray-400 dark:text-gray-500">
                        <span class="text-4xl mb-2 block">📂</span>
                        <p>No files yet</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Toast Container -->
        <div id="toastContainer" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
    </div>

    <!-- Push Notification -->
    <div id="pushNotification" class="fixed bottom-4 left-4 z-50 bg-brand-500 text-white px-4 py-3 rounded-lg shadow-lg hidden">
        <div class="flex items-center gap-3">
            <span class="animate-bounce">📥</span>
            <span>Receiving file...</span>
        </div>
    </div>

    <script>
        // ==========================================
        // Theme Management
        // ==========================================
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;

        // Load saved theme
        const savedTheme = localStorage.getItem('airbridge-theme') || 'light';
        html.classList.toggle('dark', savedTheme === 'dark');
        updateThemeIcon(savedTheme === 'dark');

        themeToggle.addEventListener('click', () => {
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('airbridge-theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        });

        function updateThemeIcon(isDark) {
            themeIcon.textContent = isDark ? '☀️' : '🌙';
        }

        // ==========================================
        // App State
        // ==========================================
        const serverUrl = window.location.origin;
        let token = new URLSearchParams(window.location.search).get('token');
        let pairingId = null;
        let activeUploads = {};
        let sseConnection = null;

        // ==========================================
        // Initialization
        // ==========================================
        if (token && token !== 'null') { 
            showApp(); 
        } else { 
            startPairing(); 
        }

        // ==========================================
        // Pairing Flow
        // ==========================================
        async function startPairing() {
            console.log('[PAIRING] Requesting pairing session...');
            try {
                const response = await fetch(`${serverUrl}/api/pair/request`, { method: 'POST' });
                const data = await response.json();
                pairingId = data.pairingId;
                console.log(`[PAIRING] Got pairingId: ${pairingId}`);
                const pairingUrl = `airbridge://pair?id=${pairingId}&server=${encodeURIComponent(serverUrl)}`;
                new QRCode(document.getElementById('qrcode'), { 
                    text: pairingUrl, 
                    width: 200, 
                    height: 200, 
                    colorDark: '#0f172a', 
                    colorLight: '#ffffff', 
                    correctLevel: QRCode.CorrectLevel.H 
                });
                checkPairingStatus();
            } catch (error) { 
                console.error('[PAIRING] Failed:', error);
                showToast('Connection failed. Please refresh.', 'error');
            }
        }

        async function checkPairingStatus() {
            try {
                const response = await fetch(`${serverUrl}/api/pair/status?id=${pairingId}`);
                const data = await response.json();
                if (data.approved && data.token) {
                    token = data.token;
                    window.history.replaceState({}, '', `${serverUrl}/?token=${token}`);
                    showApp();
                } else { 
                    setTimeout(checkPairingStatus, 2000); 
                }
            } catch (error) { 
                setTimeout(checkPairingStatus, 2000); 
            }
        }

        function showApp() {
            document.getElementById('pairing').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            loadFiles();
            startPushPolling();
            startServerSse();
            showToast('Connected to AirBridge!', 'success');
        }

        // ==========================================
        // ==========================================
        // Upload Store (Single Source of Truth)
        // ==========================================
        class UploadStore {
            constructor() {
                this.uploads = new Map();
                this.queueState = { isPaused: false, active: 0, queued: 0, paused: 0 };
                this.listeners = [];
            }

            add(upload) {
                this.uploads.set(upload.id, upload);
                this.notify();
            }

            update(id, patch) {
                const existing = this.uploads.get(id);
                if (!existing) return;
                Object.assign(existing, patch);
                this.notify();
            }

            remove(id) {
                this.uploads.delete(id);
                this.notify();
            }

            updateQueueState(state) {
                this.queueState = state;
                this.notify();
            }

            subscribe(listener) {
                this.listeners.push(listener);
            }

            notify() {
                const snapshot = Array.from(this.uploads.values());
                this.listeners.forEach(l => l(snapshot, this.queueState));
            }

            get(id) {
                return this.uploads.get(id);
            }
        }

        const uploadStore = new UploadStore();

        // ==========================================
        // SSE (Server-Sent Events)
        // ==========================================
        function startServerSse() {
            if (sseConnection) sseConnection.close();

            const sseUrl = `${serverUrl}/api/upload/events?token=${token}`;
            sseConnection = new EventSource(sseUrl);

            sseConnection.onopen = () => console.log('[SSE] Connected');

            sseConnection.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);

                    if (data.type === 'queue') {
                        // Update queue state
                        uploadStore.updateQueueState({
                            isPaused: data.isPaused,
                            active: data.active,
                            queued: data.queued,
                            paused: data.paused
                        });
                        return;
                    }

                    if (data.type === 'upload') {
                        const item = uploadStore.get(data.uploadId);
                        if (!item) return;

                        // Update bytes from server (disk is source of truth)
                        if (data.bytesReceived > item.bytesReceived) {
                            item.bytesReceived = data.bytesReceived;
                        }

                        // Handle state transitions from server
                        if (data.state === 'cancelled') {
                            if (item.worker) item.worker.cancel();
                            item.state = 'cancelled';
                            uploadStore.update(data.uploadId, { state: 'cancelled' });
                            setTimeout(() => uploadStore.remove(data.uploadId), 1000);
                        } else if (data.state === 'paused') {
                            // Server says paused - abort XHR immediately and update state
                            console.log(`[SSE] Server says paused for ${data.uploadId}, aborting XHR`);
                            if (item.worker) item.worker.pause();
                            item.state = 'paused';
                            item.isPaused = true;
                            uploadStore.update(data.uploadId, { state: 'paused', isPaused: true });
                        } else if (data.state === 'uploading') {
                            // Server is actively uploading
                            item.state = 'uploading';
                            item.isPaused = false;
                            uploadStore.update(data.uploadId, { state: 'uploading', isPaused: false });
                        } else if (data.state === 'completed') {
                            if (item.worker) item.worker.cancel();
                            item.state = 'completed';
                            item.progress = 100;
                            uploadStore.update(data.uploadId, { state: 'completed', progress: 100 });
                            showToast(`${item.name} uploaded successfully`, 'success');
                            setTimeout(() => uploadStore.remove(data.uploadId), 2000);
                        } else if (data.state === 'error') {
                            item.state = 'error';
                            uploadStore.update(data.uploadId, { state: 'error' });
                        }
                    }
                } catch (e) {
                    console.error('[SSE] Parse error:', e);
                }
            };

            sseConnection.onerror = () => {
                console.warn('[SSE] Error, reconnecting...');
                setTimeout(startServerSse, 3000);
            };
        }

        // ==========================================
        // File Management
        // ==========================================
        async function loadFiles() {
            try {
                const response = await fetch(`${serverUrl}/api/files?token=${token}`);
                const files = await response.json();
                const container = document.getElementById('filesList');

                if (files.length === 0) {
                    container.innerHTML = `
                        <div class="p-8 text-center text-gray-400 dark:text-gray-500">
                            <span class="text-4xl mb-2 block">📂</span>
                            <p>No files yet</p>
                        </div>`;
                    return;
                }

                container.innerHTML = files.map(file => `
                    <div class="flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                        <div class="flex items-center gap-3 min-w-0">
                            <span class="text-2xl">📄</span>
                            <span class="font-medium text-gray-900 dark:text-white truncate">${escapeHtml(file.name)}</span>
                        </div>
                        <a href="${serverUrl}/api/download/${file.id}?token=${token}" 
                           download 
                           class="flex items-center gap-2 px-4 py-2 bg-brand-500 hover:bg-brand-600 text-white rounded-lg transition-colors text-sm font-medium">
                            <span>⬇️</span>
                            <span>Download</span>
                        </a>
                    </div>
                `).join('');
            } catch (error) {
                showToast('Failed to load files', 'error');
            }
        }

        async function startPushPolling() {
            setInterval(async () => {
                try {
                    const response = await fetch(`${serverUrl}/api/push/status?token=${token}`);
                    const data = await response.json();
                    if (data.pending && data.file) {
                        showPushNotification();
                        const link = document.createElement('a');
                        link.href = `${serverUrl}/api/push/next?token=${token}`;
                        link.download = data.file.fileName;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        loadFiles();
                    }
                } catch (e) {}
            }, 3000);
        }

        // ==========================================
        // Upload Management with Queue Support
        // ==========================================
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');

        uploadZone.onclick = () => fileInput.click();

        uploadZone.ondragover = (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        };

        uploadZone.ondragleave = () => {
            uploadZone.classList.remove('drag-over');
        };

        uploadZone.ondrop = (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            uploadFiles(e.dataTransfer.files);
        };

        fileInput.onchange = (e) => uploadFiles(e.target.files);

        // Subscribe store to UI updates
        uploadStore.subscribe((uploads, queueState) => {
            renderUploads(uploads, queueState);
        });

        function uploadFiles(files) {
            const uploadSection = document.getElementById('uploadSection');
            uploadSection.classList.remove('hidden');

            Array.from(files).forEach(file => {
                const uploadId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);

                const upload = {
                    id: uploadId,
                    name: file.name,
                    fileSize: file.size,
                    file: file,
                    bytesReceived: 0,
                    progress: 0,
                    state: 'queued',
                    speed: 0,
                    isPaused: false,
                    worker: null
                };

                upload.worker = new UploadWorker(upload);
                uploadStore.add(upload);

                // Start immediately - queue manager will handle concurrency
                upload.worker.start();
            });
        }

        class UploadWorker {
            constructor(upload) {
                this.upload = upload;
                this.xhr = null;
            }

            async start() {
                const { id, name, file, fileSize } = this.upload;
                console.log(`[UploadWorker] start() called for ${id}, current state=${this.upload.state}`);

                // Query server status
                let serverOffset = 0;
                let serverState = 'none';

                try {
                    const res = await fetch(`${serverUrl}/api/upload/status?id=${id}&filename=${encodeURIComponent(name)}&token=${token}`);
                    const data = await res.json();
                    serverOffset = data.bytesReceived || 0;
                    serverState = data.state || 'none';
                } catch (e) {
                    serverOffset = this.upload.bytesReceived;
                }

                // Check terminal states
                if (serverState === 'completed' || serverOffset >= fileSize) {
                    uploadStore.update(id, { state: 'completed', progress: 100 });
                    return;
                }

                if (serverState === 'cancelled') {
                    uploadStore.update(id, { state: 'cancelled' });
                    return;
                }

                if (serverState === 'error') {
                    uploadStore.update(id, { state: 'error' });
                    return;
                }

                // Update our offset
                this.upload.bytesReceived = serverOffset;
                uploadStore.update(id, { bytesReceived: serverOffset, progress: (serverOffset / fileSize) * 100 });

                // Upload chunk
                const chunk = file.slice(serverOffset);
                const percentBase = (serverOffset / fileSize) * 100;

                return new Promise((resolve, reject) => {
                    this.xhr = new XMLHttpRequest();
                    this.xhr.open('POST', `${serverUrl}/api/upload?token=${token}&filename=${encodeURIComponent(name)}&id=${id}`);

                    if (serverOffset > 0) {
                        this.xhr.setRequestHeader('Content-Range', `bytes ${serverOffset}-${fileSize-1}/${fileSize}`);
                    }

                    this.xhr.upload.onprogress = (e) => {
                        // Freeze progress if not uploading (prevents drift during pause)
                        if (this.upload.state !== 'uploading') return;
                        if (e.lengthComputable) {
                            const chunkProgress = e.loaded / e.total;
                            const totalProgress = percentBase + (chunkProgress * (100 - percentBase));
                            const progress = Math.min(totalProgress, 99.9);
                            const bytesReceived = serverOffset + e.loaded;
                            uploadStore.update(id, { progress, bytesReceived });
                        }
                    };

                    this.xhr.onload = () => {
                        const xhrRef = this.xhr;
                        this.xhr = null;
                        if (xhrRef.status >= 200 && xhrRef.status < 300) {
                            try {
                                const resp = JSON.parse(xhrRef.responseText);
                                if (resp.success) {
                                    uploadStore.update(id, { state: 'completed', progress: 100 });
                                    resolve();
                                } else if (resp.state === 'paused') {
                                    uploadStore.update(id, { state: 'paused', isPaused: true });
                                    resolve();
                                } else {
                                    uploadStore.update(id, { state: 'error' });
                                    reject(new Error(resp.error || 'Upload failed'));
                                }
                            } catch (e) {
                                reject(e);
                            }
                        } else {
                            reject(new Error('HTTP ' + xhrRef.status));
                        }
                    };

                    this.xhr.onerror = () => {
                        this.xhr = null;
                        uploadStore.update(id, { state: 'error' });
                        reject(new Error('Network error'));
                    };

                    this.xhr.send(chunk);
                });
            }

            pause() {
                console.log('[UploadWorker] pause() called, xhr=', this.xhr ? 'exists' : 'null');
                if (this.xhr) {
                    this.xhr.abort();
                    this.xhr = null;
                }
            }

            cancel() {
                if (this.xhr) {
                    this.xhr.abort();
                    this.xhr = null;
                }
            }
        }

        async function pauseUpload(id) {
            await fetch(`${serverUrl}/api/upload/pause?token=${token}&id=${id}`, { method: 'POST' });
        }

        async function resumeUpload(id) {
            const item = uploadStore.get(id);
            if (!item || !item.worker) {
                console.log(`[resumeUpload] No item or worker for ${id}`);
                return;
            }

            console.log(`[resumeUpload] Resuming ${id}`);
            // Tell server we're ready to resume
            await fetch(`${serverUrl}/api/upload/resume?token=${token}&id=${id}`, { method: 'POST' });

            // Start the upload worker immediately - server is now ready
            item.isPaused = false;
            item.worker.start();
        }

        async function cancelUpload(id) {
            await fetch(`${serverUrl}/api/upload/cancel?token=${token}&id=${id}`, { method: 'POST' });
        }

        function renderUploads(uploads, queueState) {
            const container = document.getElementById('uploadProgress');
            if (!container) return;

            // Update queue stats header
            let headerHtml = '';
            if (uploads.length > 0) {
                headerHtml = `
                    <div class="flex items-center justify-between mb-3 text-sm text-gray-600 dark:text-gray-400">
                        <span>${queueState.active} active • ${queueState.queued} queued • ${queueState.paused} paused</span>
                        ${queueState.isPaused ?
                            '<button onclick="resumeAll()" class="text-brand-500 hover:text-brand-600">Resume All</button>' :
                            '<button onclick="pauseAll()" class="text-brand-500 hover:text-brand-600">Pause All</button>'}
                    </div>
                `;
            }

            // Render upload items
            const itemsHtml = uploads.map(u => renderUploadItem(u)).join('');

            container.innerHTML = headerHtml + itemsHtml;
        }

        function renderUploadItem(upload) {
            const { id, name, fileSize, progress, state, speed } = upload;
            const percent = Math.round(progress);

            let statusText = '';
            let actionButtons = '';

            switch (state) {
                case 'queued':
                    statusText = 'Queued';
                    actionButtons = `<button onclick="cancelUpload('${id}')" class="text-red-500 hover:text-red-600">Cancel</button>`;
                    break;
                case 'uploading':
                    statusText = `Uploading ${formatSpeed(speed)}`;
                    actionButtons = `
                        <button onclick="pauseUpload('${id}')" class="text-yellow-500 hover:text-yellow-600 mr-2">Pause</button>
                        <button onclick="cancelUpload('${id}')" class="text-red-500 hover:text-red-600">Cancel</button>
                    `;
                    break;
                case 'paused':
                    statusText = 'Paused';
                    actionButtons = `
                        <button onclick="resumeUpload('${id}')" class="text-green-500 hover:text-green-600 mr-2">Resume</button>
                        <button onclick="cancelUpload('${id}')" class="text-red-500 hover:text-red-600">Cancel</button>
                    `;
                    break;
                case 'completed':
                    statusText = 'Completed';
                    actionButtons = '';
                    break;
                case 'error':
                    statusText = 'Error';
                    actionButtons = `
                        <button onclick="uploadStore.get('${id}')?.worker?.start()" class="text-brand-500 hover:text-brand-600 mr-2">Retry</button>
                        <button onclick="cancelUpload('${id}')" class="text-red-500 hover:text-red-600">Cancel</button>
                    `;
                    break;
                default:
                    statusText = state;
            }

            return `
                <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700 mb-3">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-3 min-w-0">
                            <span class="text-xl">📄</span>
                            <span class="font-medium text-gray-900 dark:text-white truncate">${escapeHtml(name)}</span>
                            <span class="text-xs text-gray-500">${formatBytes(fileSize)}</span>
                        </div>
                        <div class="flex items-center gap-2 text-sm">
                            <span class="text-gray-600 dark:text-gray-300">${percent}%</span>
                            ${actionButtons}
                        </div>
                    </div>
                    <div class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r from-brand-500 to-brand-600 rounded-full transition-all duration-300" style="width: ${percent}%"></div>
                    </div>
                    <div class="flex justify-between mt-1 text-xs text-gray-500 dark:text-gray-400">
                        <span>${statusText}</span>
                        <span>${formatBytes(upload.bytesReceived)} / ${formatBytes(fileSize)}</span>
                    </div>
                </div>
            `;
        }

        function formatSpeed(bps) {
            if (bps >= 1000000) return (bps / 1000000).toFixed(1) + ' MB/s';
            if (bps >= 1000) return (bps / 1000).toFixed(1) + ' KB/s';
            return bps.toFixed(0) + ' B/s';
        }

        function formatBytes(bytes) {
            if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
            if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
            if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return bytes + ' B';
        }

        async function pauseAll() {
            const uploads = Array.from(uploadStore.uploads.values());
            const active = uploads.filter(u => u.state === 'uploading');
            for (const u of active) {
                await pauseUpload(u.id);
            }
        }

        async function resumeAll() {
            const uploads = Array.from(uploadStore.uploads.values());
            const paused = uploads.filter(u => u.state === 'paused');
            for (const u of paused) {
                // Tell server and immediately start each upload
                await fetch(`${serverUrl}/api/upload/resume?token=${token}&id=${u.id}`, { method: 'POST' });
                u.isPaused = false;
                u.worker.start();
            }
        }

        function createProgressItem(name, id, fileObject, storageKey, initialOffset) {
            const element = document.createElement('div');
            element.className = 'bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark:border-gray-700';
            element.innerHTML = `
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-3 min-w-0">
                        <span class="text-xl">📄</span>
                        <span class="font-medium text-gray-900 dark:text-white truncate">${escapeHtml(name)}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="percent text-sm font-medium text-gray-600 dark:text-gray-300">0%</span>
                        <button class="cancel-btn p-1 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors" title="Cancel">
                            ✕
                        </button>
                    </div>
                </div>
                <div class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                    <div class="bar h-full bg-gradient-to-r from-brand-500 to-brand-600 rounded-full transition-all duration-300 relative overflow-hidden">
                        <div class="progress-shimmer absolute inset-0"></div>
                    </div>
                </div>
                <div class="status-text mt-2 text-xs text-gray-500 dark:text-gray-400"></div>
            `;
            
            const bar = element.querySelector('.bar');
            const percentText = element.querySelector('.percent');
            const cancelBtn = element.querySelector('.cancel-btn');
            const statusText = element.querySelector('.status-text');

            const item = {
                id, name, fileSize: fileObject.size, element,
                xhr: null, offset: initialOffset || 0, isPaused: false, isActionLock: false, status: 'uploading',
                storageKey: storageKey || null,

                update: (p) => {
                    bar.style.width = p + '%';
                    percentText.textContent = Math.round(p) + '%';
                    if (storageKey) {
                        const bytesNow = Math.round((p / 100) * fileObject.size);
                        localStorage.setItem(storageKey, JSON.stringify({ uploadId: id, bytesReceived: bytesNow }));
                    }
                },

                setStatus: (text, type = 'info') => {
                    const colors = {
                        info: 'text-gray-500 dark:text-gray-400',
                        success: 'text-green-600 dark:text-green-400',
                        error: 'text-red-600 dark:text-red-400',
                        warning: 'text-yellow-600 dark:text-yellow-400'
                    };
                    statusText.className = `status-text mt-2 text-xs ${colors[type]}`;
                    statusText.textContent = text;
                },

                start: async function() {
                    if (this.isActionLock) return;
                    if (this.status === 'uploading' && this.xhr) return;

                    let serverOffset = 0;
                    let serverStatus = 'none';

                    try {
                        const res = await fetch(`${serverUrl}/api/upload/status?id=${this.id}&filename=${encodeURIComponent(name)}&token=${token}`);
                        const data = await res.json();
                        serverOffset = data.size || 0;
                        serverStatus = data.status || 'none';
                    } catch (e) {
                        serverOffset = this.offset;
                    }

                    // Terminal states
                    if (serverStatus === 'completed' || serverOffset >= fileObject.size) {
                        this.isPaused = false;
                        this.update(100);
                        this.done();
                        return;
                    }

                    if (serverStatus === 'cancelled') {
                        this.cancelled();
                        return;
                    }

                    // Error state - stop
                    if (serverStatus === 'error') {
                        this.status = 'error';
                        this.setStatus('Upload failed', 'error');
                        return;
                    }

                    // Paused state - wait for SSE to trigger resume
                    if (serverStatus === 'paused') {
                        this.isPaused = true;
                        this.status = 'paused';
                        this.offset = serverOffset;
                        this.update((serverOffset / this.fileSize) * 100);
                        this.setStatus('Paused - waiting for phone', 'warning');
                        // DO NOT poll - SSE will trigger resume when ready
                        return;
                    }

                    // Ready to upload
                    this.isActionLock = true;
                    this.isPaused = false;
                    this.status = 'uploading';
                    this.offset = serverOffset;
                    this.setStatus('Uploading...', 'info');

                    const chunk = fileObject.slice(this.offset);
                    const percentBase = (this.offset / this.fileSize) * 100;
                    this.update(percentBase);

                    return new Promise((resolve, reject) => {
                        this.xhr = new XMLHttpRequest();
                        this.xhr.open('POST', `${serverUrl}/api/upload?token=${token}&filename=${encodeURIComponent(name)}&id=${this.id}`);
                        if (this.offset > 0) {
                            this.xhr.setRequestHeader('Content-Range', `bytes ${this.offset}-${fileObject.size-1}/${fileObject.size}`);
                        }

                        this.xhr.upload.onprogress = (e) => {
                            if (this.isPaused) return;
                            if (e.lengthComputable) {
                                const chunkProgress = e.loaded / e.total;
                                const totalProgress = percentBase + (chunkProgress * (100 - percentBase));
                                this.update(Math.min(totalProgress, 99.9));
                            }
                        };

                        this.xhr.onload = () => {
                            const xhrRef = this.xhr;
                            this.isActionLock = false;
                            this.xhr = null;

                            if (xhrRef.status >= 200 && xhrRef.status < 300) {
                                try {
                                    const resp = JSON.parse(xhrRef.responseText);
                                    if (resp.success) {
                                        this.status = 'completed';
                                        this.update(100);
                                        this.setStatus('Completed', 'success');
                                        this.done();
                                        resolve();
                                    } else if (resp.status === 'cancelled') {
                                        this.cancelled();
                                        resolve();
                                    } else if (resp.status === 'paused') {
                                        this.remotePause(resp.bytesReceived || serverOffset);
                                        resolve();
                                    } else {
                                        this.status = 'error';
                                        this.setStatus('Error: ' + resp.status, 'error');
                                        reject(new Error(resp.status));
                                    }
                                } catch(e) {
                                    this.status = 'error';
                                    this.setStatus('Parse error', 'error');
                                    reject(e);
                                }
                            } else {
                                this.status = 'error';
                                this.setStatus(`HTTP ${xhrRef.status}`, 'error');
                                reject(new Error('HTTP ' + xhrRef.status));
                            }
                        };

                        this.xhr.onerror = () => {
                            this.isActionLock = false;
                            this.status = 'error';
                            this.setStatus('Network error', 'error');
                            reject(new Error('Network error'));
                        };

                        this.xhr.onabort = () => {
                            this.isActionLock = false;
                        };

                        this.xhr.send(chunk);
                    });
                },

                remotePause: function(serverOffset) {
                    this.isPaused = true;
                    this.isActionLock = false;
                    this.status = 'paused';
                    this.offset = serverOffset;
                    this.update((serverOffset / this.fileSize) * 100);
                    this.setStatus('Paused by phone', 'warning');
                    // DO NOT start polling - SSE will trigger resume
                },

                cancelled: function() {
                    this.status = 'cancelled';
                    this.setStatus('Cancelled', 'error');
                    if (this.xhr) this.xhr.abort();
                    if (this.storageKey) localStorage.removeItem(this.storageKey);
                    setTimeout(() => this.element.remove(), 1000);
                },

                done: function() {
                    if (this.storageKey) localStorage.removeItem(this.storageKey);
                    setTimeout(() => loadFiles(), 500);
                }
            };

            cancelBtn.onclick = () => {
                fetch(`${serverUrl}/api/upload/cancel?token=${token}&uploadId=${id}`, { method: 'POST' });
                item.cancelled();
            };

            return item;
        }

        // ==========================================
        // Utilities
        // ==========================================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                info: 'bg-brand-500'
            };
            
            const icons = {
                success: '✓',
                error: '✕',
                info: 'ℹ'
            };
            
            toast.className = `${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 toast-enter`;
            toast.innerHTML = `<span>${icons[type]}</span><span>${escapeHtml(message)}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function showPushNotification() {
            const notif = document.getElementById('pushNotification');
            notif.classList.remove('hidden');
            setTimeout(() => notif.classList.add('hidden'), 3000);
        }

        // Expose for debugging
        window.activeUploads = activeUploads;
    </script>
</body>
